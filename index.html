<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテチェックアプリ</title>

<style>
:root{
  --main:#ff8fab;
  --bg:#f9f9fb;
  --text:14px;
}

body{
  font-family:sans-serif;
  background:var(--bg);
  padding:10px;
  font-size:var(--text);
}

h2{text-align:center;}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea,select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:var(--main);
  color:white;
}

.small-btn{
  width:auto;
  padding:5px 10px;
}

.list-item{
  border-bottom:1px solid #eee;
  padding:5px;
  cursor:pointer;
}

.day-box{
  display:flex;
  flex-wrap:wrap;
}
.day-box label{
  width:60px;
}

.tab{
  display:flex;
}
.tab button{
  flex:1;
}
</style>
</head>

<body>

<h2>🏥 カルテチェック</h2>

<div class="tab">
<button onclick="showTab('daily')">日次</button>
<button onclick="showTab('monthly')">月次</button>
<button onclick="showTab('list')">一覧</button>
<button onclick="showTab('stats')">統計</button>
<button onclick="showTab('settings')">設定</button>
</div>

<!-- 日次 -->
<div id="daily" class="card">

<h3>📅 日次入力</h3>

<select id="mode">
<option value="new">新規入力</option>
<option value="continue">連続入力</option>
</select>

<input type="date" id="date">
<input placeholder="患者名" id="patient">
<input placeholder="看護師" id="nurse">

<h4>チェック項目</h4>
<textarea id="check"></textarea>

<textarea placeholder="経過記録" id="record"></textarea>
<textarea placeholder="備考" id="note"></textarea>

<label><input type="checkbox" id="fix"> 修正連絡</label>
<label><input type="checkbox" id="confirm"> 修正確認</label>
<label><input type="checkbox" id="同行"> 同行</label>

<input type="file" id="photo">

<h4>確認日チェック</h4>
<div class="day-box" id="days"></div>

<button onclick="saveDaily()">保存</button>

</div>

<!-- 月次 -->
<div id="monthly" class="card" style="display:none;">
<h3>📅 月次</h3>

<input placeholder="患者名" id="m_patient">
<input placeholder="2026年3月" id="m_month">

<label><input type="checkbox" id="rep"> 報告書</label>
<label><input type="checkbox" id="plan"> 計画評価</label>
<label><input type="checkbox" id="bedsore"> 褥瘡評価</label>
<label><input type="checkbox" id="next"> 次月計画</label>

<button onclick="saveMonthly()">保存</button>
</div>

<!-- 一覧 -->
<div id="list" class="card" style="display:none;">
<h3>📋 一覧</h3>
<div id="listData"></div>
</div>

<!-- 統計 -->
<div id="stats" class="card" style="display:none;">
<h3>📊 統計</h3>
<canvas id="chart"></canvas>
</div>

<!-- 設定 -->
<div id="settings" class="card" style="display:none;">
<h3>⚙️ 設定</h3>

<label>テーマカラー</label>
<input type="color" onchange="changeColor(this.value)">

<label>文字サイズ</label>
<select onchange="changeSize(this.value)">
<option value="12px">小</option>
<option value="14px">中</option>
<option value="18px">大</option>
</select>

<button onclick="resetAll()">全削除</button>
</div>

<script>
let dailyData = JSON.parse(localStorage.getItem("daily")||"[]");
let monthlyData = JSON.parse(localStorage.getItem("monthly")||"[]");

function showTab(id){
  ["daily","monthly","list","stats","settings"].forEach(t=>{
    document.getElementById(t).style.display="none";
  });
  document.getElementById(id).style.display="block";
  if(id==="list") renderList();
  if(id==="stats") renderChart();
}

/* 日付チェック生成 */
for(let i=1;i<=31;i++){
  document.getElementById("days").innerHTML +=
    `<label><input type="checkbox" class="dayCheck" value="${i}"> ${i}日</label>`;
}

function saveDaily(){
  let days=[];
  document.querySelectorAll(".dayCheck").forEach(el=>{
    if(el.checked) days.push(el.value);
  });

  const reader = new FileReader();
  let file = document.getElementById("photo").files[0];

  if(file){
    reader.onload=function(){
      save(reader.result);
    }
    reader.readAsDataURL(file);
  }else{
    save("");
  }

  function save(img){
    let data={
      id:Date.now(),
      date:date.value,
      patient:patient.value,
      nurse:nurse.value,
      check:check.value,
      record:record.value,
      note:note.value,
      fix:fix.checked,
      confirm:confirm.checked,
     同行:同行.checked,
      days:days,
      img:img
    };
    dailyData.push(data);
    localStorage.setItem("daily",JSON.stringify(dailyData));
    alert("保存OK");
  }
}

function saveMonthly(){
  let data={
    patient:m_patient.value,
    month:m_month.value,
    rep:rep.checked,
    plan:plan.checked,
    bedsore:bedsore.checked,
    next:next.checked
  };
  monthlyData.push(data);
  localStorage.setItem("monthly",JSON.stringify(monthlyData));
  alert("保存OK");
}

/* 一覧 */
function renderList(){
  let html="";
  dailyData.forEach(d=>{
    html+=`
    <div class="list-item" onclick="loadDaily(${d.id})">
    ${d.date}｜${d.patient}｜${d.nurse}
    </div>`;
  });
  listData.innerHTML=html;
}

function loadDaily(id){
  let d = dailyData.find(x=>x.id===id);
  showTab("daily");

  date.value=d.date;
  patient.value=d.patient;
  nurse.value=d.nurse;
  check.value=d.check;
  record.value=d.record;
  note.value=d.note;

  fix.checked=d.fix;
  confirm.checked=d.confirm;
}

/* 統計 */
function renderChart(){
  let count={};
  dailyData.forEach(d=>{
    count[d.patient]=(count[d.patient]||0)+1;
  });

  let ctx=document.getElementById("chart");
  let html="<ul>";
  for(let k in count){
    html+=`<li>${k}: ${count[k]}件</li>`;
  }
  html+="</ul>";
  document.getElementById("stats").innerHTML=html;
}

/* 設定 */
function changeColor(c){
  document.documentElement.style.setProperty("--main",c);
}
function changeSize(s){
  document.documentElement.style.setProperty("--text",s);
}
function resetAll(){
  localStorage.clear();
  alert("全削除");
  location.reload();
}
</script>

</body>
</html>
