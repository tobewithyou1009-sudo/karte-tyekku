<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテチェックアプリ 完全版</title>
<style>
:root{--main:#6c9cff;--bg:#f5f7fb;--card:#fff}
body{margin:0;font-family:sans-serif;background:var(--bg)}
header{background:var(--main);color:#fff;padding:10px;text-align:center}
.container{padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
input,select,textarea,button{width:100%;margin:5px 0;padding:8px;border-radius:8px;border:1px solid #ccc}
button{background:var(--main);color:#fff;border:none}
.tab{display:flex}
.tab button{flex:1;padding:10px;background:#ddd;border:none}
.tab button.active{background:var(--main);color:#fff}
.hidden{display:none}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
img{max-width:100%;margin-top:5px;border-radius:8px}
</style>
</head>
<body>
<header>カルテチェック</header>

<div class="tab">
<button onclick="showTab('daily')" id="btnDaily">日次</button>
<button onclick="showTab('monthly')">月次</button>
<button onclick="showTab('list')">一覧</button>
<button onclick="showTab('stats')">統計</button>
<button onclick="showTab('settings')">設定</button>
</div>

<div class="container">

<div id="daily" class="tabContent">
<div class="card">
<h3>日次入力</h3>
<select id="inputMode"><option value="new">新規入力</option><option value="continuous">連続入力</option></select>
<input type="date" id="date">
<input placeholder="患者名" id="patient">
<input placeholder="看護師" id="nurse">
<textarea placeholder="チェック抜け" id="miss"></textarea>
<textarea placeholder="経過記録" id="progress"></textarea>
<textarea placeholder="備考" id="note"></textarea>
<label><input type="checkbox" id="contact">修正連絡</label>
<label><input type="checkbox" id="confirm">修正確認</label>
<label><input type="checkbox" id="同行">同行</label>
<input type="file" id="photo" accept="image/*" onchange="previewPhoto(event)">
<div id="photoPreview"></div>
<button onclick="saveDaily()">保存</button>
<div id="dailyCalendar"></div>
</div>
</div>

<div id="monthly" class="tabContent hidden">
<div class="card">
<h3>月次入力</h3>
<select id="monthPatient"></select>
<input type="month" id="month">
<label><input type="checkbox" id="report">報告書</label>
<label><input type="checkbox" id="plan">計画評価</label>
<label><input type="checkbox" id="bedsore">褥瘡評価</label>
<label><input type="checkbox" id="next">次月計画</label>
<button onclick="saveMonthly()">保存</button>
<div id="monthCalendar"></div>
</div>
</div>

<div id="list" class="tabContent hidden">
<div class="card">
<h3>一覧</h3>
<input placeholder="患者" id="filterPatient">
<input placeholder="看護師" id="filterNurse">
<button onclick="renderList()">表示</button>
<div id="listArea"></div>
</div>
</div>

<div id="stats" class="tabContent hidden">
<div class="card">
<h3>統計</h3>
<button onclick="calcStats()">集計</button>
<pre id="statsArea"></pre>
<button onclick="downloadStats()">出力</button>
</div>
</div>

<div id="settings" class="tabContent hidden">
<div class="card">
<h3>設定</h3>
<input type="color" onchange="setColor(this.value)">
<input type="range" min="12" max="24" onchange="setFont(this.value)">
<button onclick="resetData()">全削除</button>
</div>
</div>

</div>

<script>
let daily=JSON.parse(localStorage.getItem('daily')||'[]');
let monthly=JSON.parse(localStorage.getItem('monthly')||'[]');
let photoData='';

function showTab(id){
document.querySelectorAll('.tabContent').forEach(e=>e.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.tab button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

function previewPhoto(event){
let reader=new FileReader();
reader.onload=function(){photoData=reader.result;photoPreview.innerHTML=`<img src='${photoData}'>`;}
reader.readAsDataURL(event.target.files[0]);
}

function saveDaily(){
let mode=document.getElementById('inputMode').value;
let d={id:Date.now(),date:date.value,patient:patient.value,nurse:nurse.value,miss:miss.value,progress:progress.value,note:note.value,contact:contact.checked,confirm:confirm.checked,同行:同行.checked,photo:photoData};
if(mode==='new'){daily.push(d);} else {daily.push(d);}
localStorage.setItem('daily',JSON.stringify(daily));
alert('日次データを保存しました');
renderCalendar();updatePatient();renderList();
if(mode==='continuous'){
date.value='';miss.value='';progress.value='';note.value='';contact.checked=false;confirm.checked=false;同行.checked=false;photoData='';photoPreview.innerHTML='';
}
}

function saveMonthly(){
let m={id:Date.now(),patient:monthPatient.value,month:month.value,report:report.checked,plan:plan.checked,bedsore:bedsore.checked,next:next.checked};
monthly.push(m);
localStorage.setItem('monthly',JSON.stringify(monthly));
alert('月次データを保存しました');
renderMonthCalendar();renderList();
}

function renderCalendar(){
let html='<div class="grid">';
for(let i=1;i<=31;i++){
let c=daily.some(d=>new Date(d.date).getDate()==i);
html+=`<div>${c?'✓':'□'}${i}</div>`;
}
html+='</div>';
dailyCalendar.innerHTML=html;
}

function renderMonthCalendar(){
let html='<div class="grid">';
for(let i=1;i<=12;i++){
let c=monthly.some(m=>new Date(m.month).getMonth()+1==i);
html+=`<div>${c?'✓':'□'}${i}月</div>`;
}
html+='</div>';
monthCalendar.innerHTML=html;
}

function renderList(){
let fp=filterPatient.value;
let fn=filterNurse.value;
let html='';
daily.filter(d=>(!fp||d.patient.includes(fp))&&(!fn||d.nurse.includes(fn)))
.forEach(d=>{
html+=`<div onclick="loadDaily(${d.id})">${d.date} ${d.patient} ${d.nurse}</div>`;
});
monthly.forEach(m=>{
html+=`<div>${m.month} ${m.patient} 月次</div>`;
});
listArea.innerHTML=html;
}

function loadDaily(id){
let d=daily.find(x=>x.id==id);
showTab('daily');
date.value=d.date;patient.value=d.patient;nurse.value=d.nurse;
miss.value=d.miss;progress.value=d.progress;note.value=d.note;
contact.checked=d.contact;confirm.checked=d.confirm;同行.checked=d.同行;
photoData=d.photo||'';photoPreview.innerHTML=photoData?`<img src='${photoData}'>`:'';
}

function calcStats(){
let res={連絡漏れ:0,確認漏れ:0,同行漏れ:0};
daily.forEach(d=>{
if(!d.contact)res.連絡漏れ++;
if(!d.confirm)res.確認漏れ++;
if(!d.同行)res.同行漏れ++;
});
statsArea.textContent=JSON.stringify(res,null,2);
}

function downloadStats(){
let blob=new Blob([statsArea.textContent]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='stats.txt';a.click();
}

function updatePatient(){
let names=[...new Set(daily.map(d=>d.patient))];
monthPatient.innerHTML=names.map(n=>`<option>${n}</option>`).join('');
}

function setColor(c){document.documentElement.style.setProperty('--main',c)}
function setFont(f){document.body.style.fontSize=f+'px'}
function resetData(){localStorage.clear();location.reload();}

renderCalendar();renderMonthCalendar();renderList();updatePatient();
</script>
</body>
</html>
